<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" fill="none" role="img" aria-label="Cardo feature highlights">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="960" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF2F7"/>
    </linearGradient>
  </defs>
  <rect width="960" height="320" rx="24" fill="url(#fbg)"/>
  <g font-family="Inter,Segoe UI,system-ui,sans-serif">
    <!-- card 1 -->
    <rect x="32" y="32" width="210" height="256" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
    <circle cx="72" cy="76" r="18" fill="#1C1C1E"/>
    <path d="M64 76h16M72 68v16" stroke="#F3F4F6" stroke-width="2" stroke-linecap="round"/>
    <text x="52" y="124" fill="#111827" font-size="16" font-weight="600">Spatial boxes</text>
    <text x="52" y="152" fill="#4B5563" font-size="13">Freeform canvas</text>
    <text x="52" y="172" fill="#4B5563" font-size="13">with draggable,</text>
    <text x="52" y="192" fill="#4B5563" font-size="13">resizable boxes for</text>
    <text x="52" y="212" fill="#4B5563" font-size="13">links, notes, files.</text>

    <!-- card 2 -->
    <rect x="262" y="32" width="210" height="256" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
    <circle cx="302" cy="76" r="18" fill="#1C1C1E"/>
    <rect x="293" y="68" width="18" height="14" rx="2" stroke="#F3F4F6" stroke-width="2"/>
    <path d="M293 73h18" stroke="#F3F4F6" stroke-width="2"/>
    <text x="282" y="124" fill="#111827" font-size="16" font-weight="600">Local Runtime</text>
    <text x="282" y="152" fill="#4B5563" font-size="13">One SQLite writer</text>
    <text x="282" y="172" fill="#4B5563" font-size="13">shared by Web,</text>
    <text x="282" y="192" fill="#4B5563" font-size="13">Extension, Desktop,</text>
    <text x="282" y="212" fill="#4B5563" font-size="13">and CLI.</text>

    <!-- card 3 -->
    <rect x="492" y="32" width="210" height="256" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
    <circle cx="532" cy="76" r="18" fill="#1C1C1E"/>
    <path d="M524 76c0-4 3-8 8-8s8 4 8 8-3 8-8 8" stroke="#F3F4F6" stroke-width="2" fill="none"/>
    <text x="512" y="124" fill="#111827" font-size="16" font-weight="600">Theme packs</text>
    <text x="512" y="152" fill="#4B5563" font-size="13">Classic, Glass,</text>
    <text x="512" y="172" fill="#4B5563" font-size="13">Fluent, Material,</text>
    <text x="512" y="192" fill="#4B5563" font-size="13">SwiftUI — token +</text>
    <text x="512" y="212" fill="#4B5563" font-size="13">recipe system.</text>

    <!-- card 4 -->
    <rect x="722" y="32" width="210" height="256" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
    <circle cx="762" cy="76" r="18" fill="#1C1C1E"/>
    <path d="M754 80l4 4 8-10" stroke="#F3F4F6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="742" y="124" fill="#111827" font-size="16" font-weight="600">Undo &amp; search</text>
    <text x="742" y="152" fill="#4B5563" font-size="13">Global history and</text>
    <text x="742" y="172" fill="#4B5563" font-size="13">cross-page search</text>
    <text x="742" y="192" fill="#4B5563" font-size="13">with shared state</text>
    <text x="742" y="212" fill="#4B5563" font-size="13">across clients.</text>
  </g>
</svg>
