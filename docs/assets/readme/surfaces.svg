<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 220" fill="none" role="img" aria-label="Cardo product surfaces">
  <rect width="960" height="220" rx="24" fill="#111827"/>
  <g font-family="Inter,Segoe UI,system-ui,sans-serif">
    <text x="40" y="44" fill="#F3F4F6" font-size="18" font-weight="600">Four surfaces · one workspace</text>
    <text x="40" y="68" fill="#9CA3AF" font-size="13">Install where you work — data always lives in Cardo Runtime</text>

    <g>
      <rect x="40" y="96" width="200" height="88" rx="14" fill="#1F2937" stroke="#374151"/>
      <text x="60" y="132" fill="#F9FAFB" font-size="15" font-weight="600">Runtime + CLI</text>
      <text x="60" y="156" fill="#9CA3AF" font-size="12">cardo open / serve</text>
    </g>
    <g>
      <rect x="268" y="96" width="200" height="88" rx="14" fill="#1F2937" stroke="#374151"/>
      <text x="288" y="132" fill="#F9FAFB" font-size="15" font-weight="600">Web</text>
      <text x="288" y="156" fill="#9CA3AF" font-size="12">Browser client at /app/</text>
    </g>
    <g>
      <rect x="496" y="96" width="200" height="88" rx="14" fill="#1F2937" stroke="#374151"/>
      <text x="516" y="132" fill="#F9FAFB" font-size="15" font-weight="600">Extension</text>
      <text x="516" y="156" fill="#9CA3AF" font-size="12">Chrome / Edge MV3</text>
    </g>
    <g>
      <rect x="724" y="96" width="200" height="88" rx="14" fill="#1F2937" stroke="#374151"/>
      <text x="744" y="132" fill="#F9FAFB" font-size="15" font-weight="600">Desktop</text>
      <text x="744" y="156" fill="#9CA3AF" font-size="12">Electron shell</text>
    </g>
