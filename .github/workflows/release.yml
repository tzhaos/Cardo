name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish Desktop release
    runs-on: windows-latest
    timeout-minutes: 60

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Resolve release version
        id: version
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Release tags must use the vX.Y.Z format. Received: $env:GITHUB_REF_NAME"
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Release version: $version"

      - name: Apply release version
        run: |
          $version = "${{ steps.version.outputs.version }}"
          npm version $version --no-git-tag-version --allow-same-version
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to update the package version."
          }

      - name: Run Desktop release build
        env:
          CARDO_BUILD_PROXY: ''
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          # Explicit official Electron CDN (do not use regional npm mirrors on GHA).
          ELECTRON_MIRROR: https://github.com/electron/electron/releases/download/
        run: npm run release:build

      - name: Prepare release assets
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $releaseDir = "artifacts/release"
          New-Item -ItemType Directory -Force $releaseDir | Out-Null

          Copy-Item `
            "artifacts/desktop-dist/Cardo Setup $version.exe" `
            "$releaseDir/Cardo-$version-Setup-x64.exe"
          Copy-Item `
            "artifacts/desktop-dist/Cardo $version.exe" `
            "$releaseDir/Cardo-$version-Portable-x64.exe"

          $checksumLines = Get-ChildItem $releaseDir -File |
            Sort-Object Name |
            ForEach-Object {
              $hash = (Get-FileHash -Algorithm SHA256 $_.FullName).Hash.ToLowerInvariant()
              "$hash  $($_.Name)"
            }
          Set-Content `
            -Path "$releaseDir/SHA256SUMS.txt" `
            -Value ($checksumLines -join "`n") `
            -Encoding utf8NoBOM `
            -NoNewline

          Get-ChildItem $releaseDir | Format-Table Name, Length

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cardo-v${{ steps.version.outputs.version }}-Desktop
          path: artifacts/release/*
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $version = "${{ steps.version.outputs.version }}"
          $assets = Get-ChildItem "artifacts/release" -File |
            Sort-Object Name |
            Select-Object -ExpandProperty FullName

          $notes = @"
          ## Cardo $version

          Windows Desktop packages for this release:

          - ``Cardo-$version-Setup-x64.exe`` — NSIS installer
          - ``Cardo-$version-Portable-x64.exe`` — portable executable
          - ``SHA256SUMS.txt`` — checksums

          CLI / extension / other surfaces will ship via npm and stores later.
          "@

          # Always recreate so only Desktop assets remain (no stale CLI/extension zips).
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release delete $tag --yes
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to delete existing GitHub Release $tag."
            }
          }

          gh release create $tag @assets `
            --verify-tag `
            --title "Cardo $version" `
            --notes $notes

          if ($LASTEXITCODE -ne 0) {
            throw "Failed to publish GitHub Release $tag."
          }
