# Milestone Desktop release only.
# CI on main/PR never publishes. Trigger with a stable tag vX.Y.Z or workflow_dispatch.
name: Release

on:
  push:
    tags:
      # Stable product semver only (no -rc / -beta).
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Milestone version X.Y.Z (without v). Creates tag if missing.'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish Desktop release
    runs-on: windows-latest
    timeout-minutes: 60

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      # Same static gate as CI (tsc, eslint, unit tests, official themes).
      # Also re-run inside release:build via build-pipeline for local release:build.
      - name: Static checks and tests
        run: npm run check

      - name: Resolve release version
        id: version
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          if ($env:GITHUB_REF_TYPE -eq 'tag' -and $env:GITHUB_REF_NAME -match '^v\d+\.\d+\.\d+$') {
            $version = $env:GITHUB_REF_NAME -replace '^v', ''
          } elseif ($env:DISPATCH_VERSION -and $env:DISPATCH_VERSION.Trim().Length -gt 0) {
            $version = $env:DISPATCH_VERSION.Trim() -replace '^v', ''
          } else {
            throw "Provide a stable version X.Y.Z via tag vX.Y.Z or workflow_dispatch input."
          }

          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Release version must be X.Y.Z (no prerelease). Received: $version"
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Release version: $version (tag v$version)"

      - name: Apply release version
        run: |
          $version = "${{ steps.version.outputs.version }}"
          npm version $version --no-git-tag-version --allow-same-version
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to update the package version."
          }

      - name: Ensure git tag exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $version = "${{ steps.version.outputs.version }}"

          git rev-parse "refs/tags/$tag" *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Tag $tag already exists."
            exit 0
          }

          if ($env:GITHUB_EVENT_NAME -ne 'workflow_dispatch') {
            throw "Tag $tag is missing and this run is not workflow_dispatch."
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a $tag -m "Cardo $version"
          git push origin $tag
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to create/push tag $tag."
          }

      - name: Run Desktop release build
        env:
          CARDO_BUILD_PROXY: ''
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          ELECTRON_MIRROR: https://github.com/electron/electron/releases/download/
        run: npm run release:build

      - name: Prepare release assets
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $releaseDir = "artifacts/release"
          New-Item -ItemType Directory -Force $releaseDir | Out-Null

          $setupSrc = "artifacts/desktop-dist/Cardo-$version-Setup-x64.exe"
          $portableSrc = "artifacts/desktop-dist/Cardo-$version-Portable-x64.exe"
          if (-not (Test-Path $setupSrc)) { throw "Missing setup artifact: $setupSrc" }
          if (-not (Test-Path $portableSrc)) { throw "Missing portable artifact: $portableSrc" }

          Copy-Item $setupSrc "$releaseDir/Cardo-$version-Setup-x64.exe"
          Copy-Item $portableSrc "$releaseDir/Cardo-$version-Portable-x64.exe"

          # Optional blockmap for delta tools / future electron-updater.
          $setupBlockmap = "artifacts/desktop-dist/Cardo-$version-Setup-x64.exe.blockmap"
          if (Test-Path $setupBlockmap) {
            Copy-Item $setupBlockmap "$releaseDir/Cardo-$version-Setup-x64.exe.blockmap"
          }

          $checksumLines = Get-ChildItem $releaseDir -File |
            Where-Object { $_.Name -ne 'SHA256SUMS.txt' } |
            Sort-Object Name |
            ForEach-Object {
              $hash = (Get-FileHash -Algorithm SHA256 $_.FullName).Hash.ToLowerInvariant()
              "$hash  $($_.Name)"
            }
          Set-Content `
            -Path "$releaseDir/SHA256SUMS.txt" `
            -Value ($checksumLines -join "`n") `
            -Encoding utf8NoBOM `
            -NoNewline

          Get-ChildItem $releaseDir | Format-Table Name, Length

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cardo-v${{ steps.version.outputs.version }}-Desktop
          path: artifacts/release/*
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $version = "${{ steps.version.outputs.version }}"
          $assets = Get-ChildItem "artifacts/release" -File |
            Sort-Object Name |
            Select-Object -ExpandProperty FullName

          $notes = @"
          ## Cardo $version

          Milestone Desktop build (not produced by regular CI).

          - ``Cardo-$version-Setup-x64.exe`` — NSIS installer (in-app updater uses this)
          - ``Cardo-$version-Portable-x64.exe`` — portable executable
          - ``SHA256SUMS.txt`` — checksums for verification

          Install from Setup for auto-update support. CLI / extension ship later via npm / stores.
          "@

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release delete $tag --yes
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to delete existing GitHub Release $tag."
            }
          }

          gh release create $tag @assets `
            --verify-tag `
            --title "Cardo $version" `
            --notes $notes `
            --latest

          if ($LASTEXITCODE -ne 0) {
            throw "Failed to publish GitHub Release $tag."
          }
