name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest
    timeout-minutes: 40

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Apply release version
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Release tags must use the vX.Y.Z format. Received: $env:GITHUB_REF_NAME"
          }

          npm version $version --no-git-tag-version --allow-same-version
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to update the package version."
          }

          $manifestPath = "assets/extension-shell/manifest.json"
          $manifest = Get-Content -Raw $manifestPath | ConvertFrom-Json
          $manifest.version = $version
          $manifestJson = $manifest | ConvertTo-Json -Depth 100
          Set-Content -Path $manifestPath -Value $manifestJson -Encoding utf8NoBOM -NoNewline

      - name: Run release build pipeline
        env:
          KHAOSBOX_BUILD_PROXY: ''
        run: npm run release:build

      - name: Prepare release assets
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          $releaseDir = "artifacts/release"
          New-Item -ItemType Directory -Force $releaseDir | Out-Null

          Compress-Archive `
            -Path "artifacts/extension/unpacked/*" `
            -DestinationPath "$releaseDir/KhaosBox-$version-Extension.zip" `
            -CompressionLevel Optimal

          Copy-Item `
            "artifacts/native-host/khaosbox-native-host.exe" `
            "$releaseDir/KhaosBox-$version-NativeHost-x64.exe"
          Copy-Item `
            "artifacts/desktop-dist/KhaosBox Setup $version.exe" `
            "$releaseDir/KhaosBox-$version-Setup-x64.exe"
          Copy-Item `
            "artifacts/desktop-dist/KhaosBox $version.exe" `
            "$releaseDir/KhaosBox-$version-Portable-x64.exe"

          $checksumLines = Get-ChildItem $releaseDir -File |
            Sort-Object Name |
            ForEach-Object {
              $hash = (Get-FileHash -Algorithm SHA256 $_.FullName).Hash.ToLowerInvariant()
              "$hash  $($_.Name)"
            }
          Set-Content `
            -Path "$releaseDir/SHA256SUMS.txt" `
            -Value ($checksumLines -join "`n") `
            -Encoding utf8NoBOM `
            -NoNewline

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: KhaosBox-${{ github.ref_name }}
          path: artifacts/release/*
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $version = $tag -replace '^v', ''
          $assets = Get-ChildItem "artifacts/release" -File |
            Sort-Object Name |
            Select-Object -ExpandProperty FullName

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag @assets --clobber
          } else {
            gh release create $tag @assets `
              --verify-tag `
              --generate-notes `
              --title "KhaosBox $version"
          }

          if ($LASTEXITCODE -ne 0) {
            throw "Failed to publish GitHub Release $tag."
          }
